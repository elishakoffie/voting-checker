<!DOCTYPE html>
<html>
<head>
  <title>Voting Eligibility Checker</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background-color: #f4f4f4;
    }

    .box {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
    }

    button {
      padding: 10px 15px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Voting Checker </h2>

    <input type="text" id="name" placeholder="Enter your name">
    <input type="number" id="age" placeholder="Enter your age">
    <input type="text" id="country" placeholder="Country (optional)">

    <button onclick="checkEligibility()">Check</button>

    <p id="result"></p>
  </div>

  <script src="script.js"></script>

</body>
</html>
